[package]
name = "contracts"
version = "0.2.0"
edition = "2024_07"

[dependencies]
starknet = "2.14.0"  # Pin to a specific version
openzeppelin_access = "3.0.0"
openzeppelin_token = "3.0.0"
openzeppelin_account = "3.0.0"
openzeppelin_introspection = "3.0.0"
openzeppelin_utils = "2.1.0" 

#openzeppelin_access = "2.0.0"
#openzeppelin_token = "2.0.0"
#openzeppelin_account = "2.0.0"

[dev-dependencies]
#openzeppelin_utils = "2.0.0"
snforge_std = "0.56.0"

[[target.starknet-contract]]
casm = true

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

[tool.fmt]
sort-module-level-items = true

[scripts]
test = "snforge test"